    { sub:"A", text:"DMARD 無法有效減少接受 TEA 的比例。", answer:false, exp:"如同 shoulder arthroplasty，DMARD（尤其 biologics）的廣泛使用顯著減少了 RA 患者的關節破壞進程，「有效降低了」需要接受 TEA 的比例；此描述與 TSA 問題相同邏輯，「無法有效減少」是錯誤的。" },
    { sub:"B", text:"TEA 最常需要 revision 的原因是感染和 aseptic loosening。", answer:true, exp:"TEA revision 原因：(1)感染（最常見，約25-30%）、(2)Aseptic loosening（尤其肱骨側，約20-25%）、(3)Periprosthetic fracture、(4)Component failure；感染是最多見的原因。" },
    { sub:"C", text:"針對 rheumatoid arthritis 的患者，選擇 TEA 時會以 non-constrained 的植入物類型優先。", answer:true, exp:"RA 患者 TEA 選擇：通常 RA 患者韌帶相對保存較好（RA 的問題是骨和軟骨，韌帶早期可能尚完整），因此可使用「unconstrained 或 unlinked」型，保留更多生理活動；但若韌帶不足，改用 linked semiconstrained。" },
    { sub:"D", text:"Linked semiconstrained 的 TEA 可用於肘關節 collateral ligament 功能不足的患者。", answer:true, exp:"Linked TEA（如 Coonrad-Morrey, Souter-Strathclyde）：鉸鏈連接肱尺，不依賴韌帶穩定，適用於：(1)嚴重韌帶功能不足的 RA，(2)創傷後韌帶缺損，(3)翻修手術；提供可靠穩定度但磨耗較高。" }
  ]},
  { id:84, group:"肘關節神經疾病", text:"下列關於 elbow nerve disorder 的敘述", subs: [
    { sub:"A", text:"Cubital tunnel syndrome 若沒有接受治療，可能會導致 radial nerve 相關區域的感覺與運動功能異常。", answer:false, exp:"Cubital tunnel syndrome 是「尺神經（ulnar nerve）」在肘部受壓，進展性損傷會造成第4、5指感覺缺失和骨間肌、小魚際肌萎縮（ulnar claw hand）；與 radial nerve 無關。" },
    { sub:"B", text:"診斷 Cubital tunnel syndrome 時，需把 nerve root (C8/T1) compression 和 Guyon canal syndrome 列入鑑別診斷。", answer:true, exp:"Cubital tunnel 鑑別診斷：(1)C8/T1 根性壓迫（頸椎）——雖也影響小指，但有頸椎徵象，(2)Guyon canal syndrome（腕部尺神經壓迫）——感覺/運動受累範圍不同（不含背側感覺），(3)TOS、Pancoast tumor。" },
    { sub:"C", text:"Medial epicondylectomy 是治療 cubital tunnel syndrome 的手術方法之一。", answer:true, exp:"Cubital tunnel 手術選項：(1)原位減壓（simple decompression），(2)Medial epicondylectomy（切除內上髁），(3)前移術（subcutaneous/submuscular/intramuscular transposition）；三種均是公認手術方法。" },
    { sub:"D", text:"Radial tunnel syndrome 的治療以手術為主，非手術治療一般效果不佳。", answer:false, exp:"Radial tunnel syndrome（橈神經在旋前圓肌近端受壓）：多數建議「保守治療優先」（NSAIDs、休息、物理治療、皮質類固醇注射）3-6個月；手術（外科減壓）只在保守失敗後考慮。並非「以手術為主」。" }
  ]},
  { id:85, group:"足部影像生物力學", text:"下列關於足部影像及生物力學", subs: [
    { sub:"A", text:"術中3D 螢光透視機比傳統2D，可以有效改善臨床結果及跟骨骨折復位的品質。", answer:false, exp:"雖然3D intraoperative CT/fluoroscopy 可提供更好的即時影像品質，但研究顯示相較傳統2D fluoroscopy，在「臨床功能結果」的改善方面證據不一致，尤其是跟骨骨折的影像轉化為更好臨床結果未被全面證實。" },
    { sub:"B", text:"3T MRI 的 T1 fat suppression 影像對診斷神經病變及 Morton's neuroma 特別有效。", answer:false, exp:"研究顯示 1.5T 和 3T MRI 在 Morton's neuroma 診斷的準確性相當；3T 雖解析度較高，但 fat suppression 在3T 有更多均一性問題（B1 inhomogeneity）；T1 FS並非 Morton's neuroma 的首選序列（STIR 或 T1 SE 較好），描述有誤。" },
    { sub:"C", text:"大體研究發現，阿基里斯腱縫合使用雙排鉚釘固定比單排固定要多出50牛頓的破壞荷載，故術後可以馬上下來負重行走。", answer:false, exp:"阿基里斯腱修補生物力學研究的具體數字因研究而異；更重要的是，即使有更強的固定，「立即負重」（immediate weight-bearing）的安全性需要臨床 RCT 支持，並非僅靠大體研究即可得出此結論。" },
    { sub:"D", text:"全踝人工關節置換後，距骨的向後位移比向前位移，更會導致腳踝活動下降以及橫向活動增加。", answer:true, exp:"全踝置換後距骨位移研究：posterior talar translation（向後位移）造成踝關節背屈受限和橫向（transverse plane）活動增加，影響步態；這強調了踝關節假體安裝時距骨對位的重要性。" }
  ]},
  { id:86, group:"中後足退化", text:"下列關於中、後足退化", subs: [
    { sub:"A", text:"中、後足的退化大部分都是創傷後造成的，單獨的距下關節、跟骰關節、距舟關節和跗蹠關節退化都很常在創傷後發生。", answer:false, exp:"中足退化不只是創傷後，原發性退化（OA）、炎症性關節炎、神經性病變也很常見；而且「單獨各關節退化」的好發模式也不同（跟骰關節單獨退化非常少見），此描述過度簡化。" },
    { sub:"B", text:"跟骰關節融合的適應症抓得比較嚴謹，不然可能會大幅減少距下關節的活動度。", answer:false, exp:"正確知識：跟骰關節（calcaneocuboid）融合主要影響「距舟關節（talonavicular）」的活動度，因為三關節（triple joint complex）協同運動；跟骰融合可減少距下關節活動約50%，並非「距下關節」直接受影響——但影響路徑仍需準確描述；此選項描述有誤。" },
    { sub:"C", text:"中足退化的病人通常會在腳跟踮起時更疼痛，更嚴重的會合併足部變形（外展、背曲、搖椅底狀腳和扁平足）。", answer:true, exp:"Midfoot OA（中足退化）：疼痛在負重、步行末期踮腳時加重；進展性變形包括中足 sag（背曲/dorsiflexion）、外展（abduction）、搖椅底（rocker-bottom）、扁平足（pes planus），是 progressive collapsing foot deformity 的一部分。" },
    { sub:"D", text:"中足退化的手術中，一般外柱保守治療為主，內柱和中柱則進行融合，術後不太會疼痛也不需輔具。", answer:false, exp:"中足融合術後：需要輔具（矯形足墊或足弓支撐）至少6-12個月，部分患者長期需要；且外柱（lateral column, 4th and 5th TMT）融合適應症需審慎（影響旋轉活動），但內柱融合後疼痛緩解雖良好，「不需輔具」的說法過於樂觀。" }
  ]},
  { id:87, group:"足部缺血性壞死", text:"下列關於足部缺血性壞死", subs: [
    { sub:"A", text:"針對距骨缺血性壞死，關節保留手術包括核心減壓、帶血管或不帶血管的骨移植，但不論有無關節退化都很有用。", answer:false, exp:"距骨骨壞死（AVN）關節保留手術（core decompression, bone grafting）主要適用於「無明顯關節退化（pre-collapse 或 collapse without OA）」的早期；若已有明顯踝關節炎，關節保留手術效果差，應考慮關節置換或融合術。「不論有無退化都有用」是錯誤的。" },
    { sub:"B", text:"距骨 AVN 較小且合併踝關節炎，可使用初級全踝人工關節置換；較大且合併踝及距下關節炎，則建議脛距跟骨融合術。", answer:false, exp:"Distance AVN 的治療選擇：有明顯骨壞死的距骨（尤其 > 50% 壞死）使用全踝置換（TAA）風險高（距骨塌陷→假體下沉失敗）；脛距跟骨融合（tibiotalocalcaneal fusion）則適合廣泛 AVN。題目的大小和適應症描述方向有誤。" },
    { sub:"C", text:"舟狀骨壞死的好發年齡是雙峰式分佈，前者稱 Kohler disease，後者稱 Mueller-Weiss syndrome 或 Bertolotti disease。", answer:false, exp:"Kohler disease：幼童（2-9歲）足舟骨骨軟骨病；Mueller-Weiss syndrome：中年婦女的足舟骨應力性壞死/骨軟化；「Bertolotti disease」是腰骶移行椎（腰骶化），與足部無關，描述有誤。" },
    { sub:"D", text:"較小蹠骨缺血性壞死（Freiberg's infraction），保守治療成效不佳，大多需要手術治療。", answer:false, exp:"Freiberg's infraction（第2蹠骨頭骨壞死最常見）：多數病例「保守治療有效」（減壓鞋墊、免負重、NSAIDs），早期保守成功率高；手術（清創、關節成形、截骨）僅用於保守治療失敗的晚期（Smillie IV-V）病例。" }
  ]},
  { id:88, group:"糖尿病足", text:"下列關於糖尿病足控制", subs: [
    { sub:"A", text:"糖尿病定義為糖化血色素超過6.0%，超過8%及空腹血糖超過126mg/dL時，截肢風險會增加。", answer:false, exp:"糖尿病診斷：HbA1c ≥ 6.5%（ADA 標準），空腹血糖 ≥ 126mg/dL；截肢風險增加的 HbA1c 界值通常以「> 7%」（控制不佳）為參考，「6.0%」和「8%」的描述均有誤。" },
    { sub:"B", text:"當傷口有滲液時需持續使用濕敷，傷口乾燥時需持續保持乾燥；負壓傷口照護和高壓氧治療都可以促進潰瘍癒合。", answer:false, exp:"現代傷口護理：(1)「濕潤環境」有利癒合，乾燥傷口並非最佳；(2)滲液多的傷口應使用吸收性敷料（foam, alginate）而非持續 wet dressing；(3)負壓治療（NPWT）有效，高壓氧在特定適應症有幫助。簡單濕/乾二分法是過時的觀念。" },
    { sub:"C", text:"糖尿病足感染若治療24至48小時後反應不佳，需換上廣效型抗生素。", answer:false, exp:"糖尿病足感染抗生素：初始選擇廣效覆蓋，若48-72小時無改善，應「升階（escalation）」或根據培養調整，而非只換廣效型；且初始已應廣效覆蓋，48小時改為廣效的描述邏輯有誤。" },
    { sub:"D", text:"血管重建可減緩糖尿病病患接近三成的嚴重肢體缺血截肢率，兩種方式（開放vs血管內）傷口復原率和截肢率相當。", answer:true, exp:"BASIL trial 和多項研究：血管重建（revascularization）可將截肢率降低約30%；open bypass vs. endovascular（PTA/stenting）在重症肢體缺血（CLI）患者的1年傷口癒合率和截肢率相當（open 長期較優），符合敘述。" }
  ]},
  { id:89, group:"夏柯式神經骨關節病變", text:"下列關於 Charcot arthropathy", subs: [
    { sub:"A", text:"分類上依據臨床表現和解剖位置分別使用 Brodsky 和 Eichenholtz 分類，腳踝依有無跟骨結節骨折再分成3A和3B。", answer:false, exp:"Eichenholtz 分類：依臨床和影像分3期（I炎症/II癒合/III重塑）；Brodsky 分類：依解剖位置（Type 1中足、2跟骨、3A踝、3B後跟骨結節），3A和3B是以「踝關節 vs 跟骨結節」區分，並非「有無跟骨結節骨折」，細節描述有誤。" },
    { sub:"B", text:"可利用抬腿五分鐘後紅腫是否消散和 ESR 是否超過70mm/hr 來區分 Charcot arthropathy 和感染。", answer:true, exp:"Charcot vs 感染鑑別：(1)elevation test—抬腿5分鐘後紅腫消散→Charcot（充血性），不消散→蜂窩性組織炎；(2)ESR > 70mm/hr + CRP 升高→支持慢性骨髓炎；兩者結合有助鑑別。" },
    { sub:"C", text:"手術通常不建議在第一期進行，一般會等到第三期才進行，手術目的是重建穩定可以穿鞋的腳。", answer:true, exp:"Charcot 手術時機：活躍炎症期（Eichenholtz Stage I）骨質脆弱，固定失敗率高，不建議手術；等待 Stage III（重塑期，骨質硬化穩定）再手術，目的是「重建穩定的可穿鞋腳型（plantigrade, shoeable foot）」。" },
    { sub:"D", text:"若是有感染，則需先使用外固定，待感染清除後再轉內固定，術後至少保持12-16週不負重。", answer:true, exp:"Charcot 合併感染的手術策略：(1)先清創＋外固定（清除感染）→(2)感染控制後轉換內固定（重建穩定）；術後 non-weight bearing 至少12-16週（等待融合），同時維持軟組織覆蓋，是標準治療流程。" }
  ]},
  { id:90, group:"足弓變形", text:"下列關於足弓變形", subs: [

// Flatten into individual sub-questions
let allItems = [];
questions.forEach(q => {
  q.subs.forEach(sub => {
    allItems.push({
      qId: q.id,
      group: q.group,
      qText: q.text,
      sub: sub.sub,
      text: sub.text,
      answer: sub.answer,
      exp: sub.exp,
      userAnswer: null
    });
  });
});

let currentFilter = 'all';

function getFiltered() {
  return allItems.filter(item => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'unanswered') return item.userAnswer === null;
    if (currentFilter === 'correct') return item.userAnswer === item.answer && item.userAnswer !== null;
    if (currentFilter === 'wrong') return item.userAnswer !== null && item.userAnswer !== item.answer;
    return true;
  });
}

function filterQuestions(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function answer(qId, sub, val) {
  const idx = allItems.findIndex(i => i.qId === qId && i.sub === sub);
  if (idx === -1 || allItems[idx].userAnswer !== null) return;
  allItems[idx].userAnswer = val;
  updateStats();
  render();
}

function updateStats() {
  const answered = allItems.filter(i => i.userAnswer !== null).length;
  const correct = allItems.filter(i => i.userAnswer === i.answer && i.userAnswer !== null).length;
  const wrong = answered - correct;
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('progressBar').style.width = (answered / allItems.length * 100) + '%';
  // Update filter labels
  const unanswered = allItems.filter(i => i.userAnswer === null).length;
  const filterBtns = document.querySelectorAll('.filter-btn');
  filterBtns[0].textContent = `全部 (${allItems.length})`;
  filterBtns[1].textContent = `未作答 (${unanswered})`;
  filterBtns[2].textContent = `已答對 (${correct})`;
  filterBtns[3].textContent = `已答錯 (${wrong})`;
  document.getElementById('navInfo').textContent = `顯示 ${getFiltered().length} 題`;
}

function render() {
  const filtered = getFiltered();
  const container = document.getElementById('quizContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎉</div><p>此分類目前沒有題目</p></div>';
    return;
  }
  container.innerHTML = filtered.map(item => renderItem(item)).join('');
  document.getElementById('navInfo').textContent = `顯示 ${filtered.length} 題`;
}

function renderItem(item) {
  const answered = item.userAnswer !== null;
  const isCorrect = answered && item.userAnswer === item.answer;
  const isWrong = answered && item.userAnswer !== item.answer;
  const correctVal = item.answer;

  const cardClass = answered ? (isCorrect ? 'answered-correct' : 'answered-wrong') : '';
  const badge = answered ? `<div class="result-badge ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ 正確' : '✗ 答錯'}</div>` : '';

  const trueClass = !answered ? '' : (correctVal === true ? 'correct' : (item.userAnswer === true ? 'wrong' : ''));
  const falseClass = !answered ? '' : (correctVal === false ? 'correct' : (item.userAnswer === false ? 'wrong' : ''));
  const disabled = answered ? 'disabled' : '';

  const expHtml = answered ? `
    <div class="explanation show">
      <div class="exp-title">📖 詳解</div>
      <div class="correct-mark">✓ 正確答案：${item.answer ? '○（是）' : '×（非）'}</div>
      <div>${item.exp}</div>
    </div>` : '';

  return `
    <div class="q-card ${cardClass}" id="card-${item.qId}-${item.sub}">
      ${badge}
      <div class="q-header">
        <div class="q-num">${item.qId}${item.sub}</div>
        <div>
          <div class="q-category">${item.group}</div>
          <div class="q-sub">${item.qText}</div>
          <div class="q-text">${item.sub}. ${item.text}</div>
        </div>
      </div>
      <div class="options">
        <div class="option ${trueClass} ${disabled}" onclick="answer(${item.qId}, '${item.sub}', true)">
          <div class="option-label">○</div>
          <div>是（True）</div>
        </div>
        <div class="option ${falseClass} ${disabled}" onclick="answer(${item.qId}, '${item.sub}', false)">
          <div class="option-label">×</div>
          <div>非（False）</div>
        </div>
      </div>
      ${expHtml}
    </div>`;
}

function showScore() {
  const answered = allItems.filter(i => i.userAnswer !== null).length;
  const correct = allItems.filter(i => i.userAnswer === i.answer && i.userAnswer !== null).length;
  const score = Math.round(correct / allItems.length * 100);
  const card = document.getElementById('scoreCard');
  document.getElementById('scoreBig').textContent = score + '分';
  document.getElementById('scoreCorrect').textContent = correct;
  let grade = '';
  if (score >= 90) grade = '🏆 優秀！通過率甲等';
  else if (score >= 80) grade = '🎯 良好！繼續加油';
  else if (score >= 70) grade = '📚 及格，建議複習錯題';
  else grade = '💪 需要加強，多看詳解';
  document.getElementById('scoreGrade').textContent = grade;
  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  if (!confirm('確定要重新作答嗎？所有答案將被清除。')) return;
  allItems.forEach(i => i.userAnswer = null);
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach((b, idx) => {
    b.classList.toggle('active', idx === 0);
  });
  document.getElementById('scoreCard').classList.remove('show');
  updateStats();
  render();
}

// Initial render
updateStats();
render();
</script>
</body>
</html>
